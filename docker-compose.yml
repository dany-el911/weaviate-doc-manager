# version: '3.4'
services:
  # --- Ollama in Docker (stessa rete di Weaviate) ---
  ollama:
    image: ollama/ollama:latest
    container_name: weaviate-doc-manager-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Ollama Model Initializer (one-time setup) ---
  ollama-init:
    image: ollama/ollama:latest
    container_name: weaviate-doc-manager-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama:/root/.ollama
      - ./init-ollama.sh:/init-ollama.sh:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/bash", "/init-ollama.sh"]
    restart: "no"

  # --- Weaviate ---
  weaviate:
    image: semitechnologies/weaviate:1.33.4
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'

      # 1) Moduli Ollama
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'

      # 2) Endpoint Ollama: dentro Docker si chiama "ollama"
      #TEXT2VEC_OLLAMA_API_ENDPOINT: 'http://192.168.6.16:11434'
      #GENERATIVE_OLLAMA_API_ENDPOINT: 'http://192.168.6.16:11434'
      TEXT2VEC_OLLAMA_API_ENDPOINT: 'http://ollama:11434'
      GENERATIVE_OLLAMA_API_ENDPOINT: 'http://ollama:11434'

      TEXT2VEC_OLLAMA_MODEL: 'qwen3-embedding:4b'
      GENERATIVE_OLLAMA_MODEL: 'qwen2.5:3b-instruct'

      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  weaviate_data:
  ollama:

