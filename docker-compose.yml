version: '3.4'
services:
  weaviate:
    image: semitechnologies/weaviate:1.33.4
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      # 1. Abilitiamo i moduli per Ollama
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'

      # 2. Impostiamo Ollama come vettorizzatore di default (facoltativo ma comodo)
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'

      # 3. Diciamo a Weaviate dove trovare Ollama sul tuo Mac.
      # "host.docker.internal" permette al container di vedere il tuo Mac (dove gira Ollama).
      OLLAMA_API_BASE_URL: 'http://host.docker.internal:11434'

      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  weaviate_data: